name: Validate Contribution

on:
  pull_request:
    paths:
      - "data/contributions/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate spectral data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install speclib
        run: pip install -e ".[dev]"

      - name: Validate contributions
        run: |
          python -c "
          import sys
          from pathlib import Path

          errors = []
          contributions = Path('data/contributions')

          for contrib_dir in sorted(contributions.iterdir()):
              if not contrib_dir.is_dir() or contrib_dir.name == 'TEMPLATE':
                  continue

              manifest = contrib_dir / 'contribution.yaml'
              if not manifest.exists():
                  errors.append(f'{contrib_dir.name}: Missing contribution.yaml')
                  continue

              try:
                  from speclib.ingest.contribution import ContributionAdapter
                  adapter = ContributionAdapter(manifest)
                  records = adapter.discover()
                  print(f'{contrib_dir.name}: {len(records)} spectra found')

                  for record in records:
                      raw = adapter.fetch(record.record_id)
                      spec = adapter.normalize(raw)
                      print(f'  OK: {spec.name} ({spec.n_bands} bands)')

              except Exception as e:
                  errors.append(f'{contrib_dir.name}: {e}')

          if errors:
              print('\nValidation FAILED:')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)
          else:
              print('\nAll contributions valid.')
          "

      - name: Post result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const result = '${{ job.status }}' === 'success'
              ? '**Contribution validation passed.** Data format, calibration flag, and metadata are valid.\n\n> Note: Maintainer review of contributor credentials and data quality is still required before merge.'
              : '**Contribution validation failed.** Check the workflow logs for details.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: result
            });
