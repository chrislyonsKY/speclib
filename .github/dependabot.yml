version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      development:
        patterns:
          - "pytest*"
          - "ruff"
          - "pre-commit"
      scientific:
        patterns:
          - "numpy"
          - "scipy"
          - "h5py"
          - "pyarrow"
          - "matplotlib"
